# Nightly refresh of data/screening/snapshot.parquet.
#
# Requires SEC_USER_AGENT to be set in:
#   Settings -> Secrets and variables -> Actions -> New repository secret
#   Name : SEC_USER_AGENT
#   Value: trading-droppers your-email@example.com   (use a real email)
#
# The snapshot is committed back to main on change; Streamlit Cloud auto-redeploys.

name: Refresh screening snapshot

on:
  # 09:17 UTC daily. Off-the-hour to avoid the scheduled-jobs queue spike
  # GitHub serializes at HH:00. By 09:17 UTC, the previous US session has
  # been closed long enough for yfinance + SEC to have the final numbers.
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:  # manual trigger from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Build snapshot
        env:
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: |
          if [ -z "$SEC_USER_AGENT" ]; then
            echo "::error::SEC_USER_AGENT secret is not set. See workflow header."
            exit 1
          fi
          python scripts/build_screening_snapshot.py \
            --indices sp500 sp400 sp600 nasdaq100 russell2000

      - name: Commit + push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/screening/snapshot.parquet
          if git diff --staged --quiet; then
            echo "No changes to snapshot."
          else
            git commit -m "chore: refresh screening snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
